services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: skillplant
      POSTGRES_USER: skillplant
      POSTGRES_PASSWORD: skillplant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillplant -d skillplant"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://skillplant:skillplant@postgres:5432/skillplant
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JOBS_DIR: /tmp/skill-plant-jobs
      UPLOAD_DIR: /tmp/skill-plant-uploads
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - uploads_data:/tmp/skill-plant-uploads
      - jobs_data:/tmp/skill-plant-jobs
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  claude-code:
    build:
      context: .
      dockerfile: docker/claude-code/Dockerfile
    environment:
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
    volumes:
      - jobs_data:/workspace
    profiles:
      - claude

volumes:
  postgres_data:
  uploads_data:
  jobs_data:
